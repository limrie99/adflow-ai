services:
  adflow:
    image: ghcr.io/limrie99/adflow-ai:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WHOP_API_KEY: ${WHOP_API_KEY}
      WHOP_APP_ID: ${WHOP_APP_ID}
      NEXT_PUBLIC_WHOP_APP_ID: ${NEXT_PUBLIC_WHOP_APP_ID}
      WHOP_WEBHOOK_SECRET: ${WHOP_WEBHOOK_SECRET}
      NEXT_PUBLIC_WHOP_CHECKOUT_URL: ${NEXT_PUBLIC_WHOP_CHECKOUT_URL}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      SCRAPE_CRON_SECRET: ${SCRAPE_CRON_SECRET}
      SCRAPE_NICHES: ${SCRAPE_NICHES}
      SCRAPE_COUNTRY: ${SCRAPE_COUNTRY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
